<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nearby Services Finder</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,Arial,sans-serif;
}

body{
background:#f3f5f9;
}

header{

height:70px;

background:#2563eb;

color:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 40px;

font-size:22px;

font-weight:bold;
}

.info{

background:white;

margin:20px;

padding:15px 25px;

border-radius:12px;

box-shadow:0 2px 10px rgba(0,0,0,.15);

display:flex;

justify-content:space-around;

font-size:18px;
}

.container{

display:flex;

height:calc(100vh - 150px);

padding:20px;

gap:20px;

}

.sidebar{

width:35%;

overflow-y:auto;

background:white;

border-radius:15px;

padding:20px;

box-shadow:0 3px 15px rgba(0,0,0,.15);

}

#map{

width:65%;

border-radius:15px;

box-shadow:0 3px 15px rgba(0,0,0,.15);

}

.card{

background:#fff;

border-left:6px solid #2563eb;

padding:15px;

margin-bottom:15px;

border-radius:10px;

box-shadow:0 2px 8px rgba(0,0,0,.1);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 8px 20px rgba(0,0,0,.25);

}

.card h3{

color:#2563eb;

margin-bottom:10px;

}

.card p{

margin:6px 0;

font-size:15px;

}

.card a{

display:inline-block;

margin-top:10px;

padding:8px 15px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:8px;

}

.card a:hover{

background:#1d4ed8;

}
@media screen and (max-width: 768px){

    .container{
        flex-direction:column;
        height:auto;
    }

    .sidebar{
        width:100%;
        height:auto;
    }

   #map{
    width:100%;
    height:500px;
    border-radius:15px;
    box-shadow:0 3px 15px rgba(0,0,0,.15);
}

}

    .info{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

    header{
        padding:15px;
        font-size:18px;
    }
}
</style>

</head>

<body>

<header>

<div>
🌍 Nearby Services Finder
</div>

<div>

<a href="/" style="color:white;text-decoration:none;">
🏠 Home
</a>

</div>

</header>

<div class="info">

<div>

📍
<b>{{ district }}</b>

</div>

<div>

🏥
<b>{{ service }}</b>

</div>

<div>

📏
<b>{{ radius/1000 }} KM</b>

</div>

</div>

<div class="container">

<div class="sidebar">

<h2>Nearby Results</h2>

<div id="results"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let lat={{lat}};
let lon={{lon}};
let service="{{service}}";
let radius={{radius}};

let map=L.map('map').setView([lat,lon],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);
setTimeout(() => {
    map.invalidateSize();
}, 500);
const redIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',

    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
});
L.marker([lat, lon], {icon: redIcon})
.addTo(map)
.bindPopup("📍 My Location")
.openPopup();
fetch("/search",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        lat:lat,
        lon:lon,
        service:service,
        radius:radius
    })
})
.then(response=>response.json())
.then(data=>{

    let html="";

    data.forEach(place=>{

        if(place.lat && place.lon){

            L.marker([place.lat,place.lon])
            .addTo(map)
            .bindPopup(`
                <b>${place.name}</b><br>
                📍 ${place.address}
            `);

        }

        html += `
        <div class="card">
            <h3>${place.name}</h3>
            <p>📍 ${place.address}</p>

            <a target="_blank"
            href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name)}">
            Open in Google Maps
            </a>
        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;

});

</script>

</body>

</html>
